spring:
  datasource:
    url: jdbc:h2:mem:recolectadb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  cache:
    type: none

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

server:
  port: 8080

jwt:
  secret: miClaveSecretaSuperLargaParaQueNoTrueneJWT1234567890
  expiration: 86400000
  refresh-expiration: 604800000

app:
  geocoding:
    nominatim-url: https://nominatim.openstreetmap.org
  simulation:
    interval-ms: 30000

firebase:
  credentials-path: none

logging:
  level:
    com.itc.recolecta: DEBUG
    org.springframework.security: DEBUG
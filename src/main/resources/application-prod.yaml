spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 60000

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

app:
  geocoding:
    nominatim-url: https://nominatim.openstreetmap.org
  simulation:
    interval-ms: 30000

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:none}

logging:
  level:
    com.itc.recolecta: INFO
    org.springframework.security: WARN